<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VocalFlow Windows</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h2>VocalFlow</h2>

    <!-- Hotkey Selector -->
    <label for="hotkey">Hotkey:</label>
    <select id="hotkey">
      <option value="Alt">Alt</option>
      <option value="Control">Ctrl</option>
      <option value="Shift">Shift</option>
    </select>

    <p id="status">Hold above slected key to speak</p>

    <p id="text"></p>

    <p id="balance">Loading balances...</p>

    <p id="hint">Release key → text appears | check your clipboard</p>
    <button onclick ="window.location.reload()" id = "refreash">Refreashing...</button>
  </div>

  <script>
    const { startRecording, stopRecording } = require('./audio');
    const { transcribeAudio } = require('./deepgram');
    const { polishText } = require('./groq');
    const { typeText } = require('./injector');
    const { getDeepgramBalance, getGroqStatus } = require('./balance');

    let keyHeld = false;
    let isProcessing = false;

    // Get selected hotkey
    function getSelectedKey() {
      return document.getElementById("hotkey").value;
    }

    // KEY DOWN → start recording
    document.addEventListener("keydown", async (e) => {
      const HOLD_KEY = getSelectedKey();

      if (e.key === HOLD_KEY && !keyHeld && !isProcessing) {
        keyHeld = true;

        await startRecording();

        document.getElementById("status").innerText = "Recording...";
      }
    });

    // KEY UP → stop + process
    document.addEventListener("keyup", async (e) => {
      const HOLD_KEY = getSelectedKey();

      if (e.key === HOLD_KEY && keyHeld) {
        keyHeld = false;
        isProcessing = true;

        document.getElementById("status").innerText = "Processing...";

        try {
          const blob = await stopRecording();

          const raw = await transcribeAudio(blob);
          const text = await polishText(raw);

          document.getElementById("text").innerText = text;

          typeText(text);

          document.getElementById("status").innerText = "Done";

        } catch (err) {
          console.error(err);
          document.getElementById("status").innerText = "Error";
        }

        isProcessing = false;
      }
    });

    // Load API balances
    async function loadBalances() {
      try {
        const dg = await getDeepgramBalance();
        const groq = await getGroqStatus();

        document.getElementById("balance").innerText =
          `Deepgram: ${dg} | Groq: ${groq}`;
          document.getElementById("refreash").innerText = "Refreash";
      } catch {
        document.getElementById("balance").innerText = "Balance error";
        
      }
    }

    loadBalances();

    //Save + load hotkey preference
    window.onload = () => {
      const saved = localStorage.getItem("hotkey");
      if (saved) {
        document.getElementById("hotkey").value = saved;
      }
    };

    document.getElementById("hotkey").addEventListener("change", (e) => {
      localStorage.setItem("hotkey", e.target.value);
    });
  </script>

</body>
</html>
